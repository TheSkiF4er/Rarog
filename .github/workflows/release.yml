name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release metadata
        run: npm run release:verify

      - name: Build all packages
        run: npm run build:all

      - name: Run release test gate
        run: npm run test:release

      - name: Verify publishable package artifacts
        run: npm run verify:artifacts

      - name: Pack publishable packages
        run: npm run pack:packages

      - name: Publish @rarog/js
        run: npm publish ./packages/js --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @rarog/react
        run: npm publish ./packages/react --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @rarog/vue
        run: npm publish ./packages/vue --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
