name: CI

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "RELEASE.md"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main, master, develop]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "RELEASE.md"
      - ".github/workflows/docs.yml"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check docs contract
        run: npm run docs:lint

      - name: Build CSS, JS, and adapters
        run: npm run build:all

      - name: Verify publishable package artifacts
        run: npm run verify:artifacts

      - name: Run fast CI test gate
        run: npm run test:ci

      - name: Run release quality gates subset
        run: npm run test:starters-install && npm run test:package-matrix && npm run test:examples-ci && npm run docs:links
