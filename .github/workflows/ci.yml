name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build CSS
        run: npm run build

      - name: Build adapters
        run: npm run build:adapters

      - name: Package adapters
        run: npm run pack:react && npm run pack:vue

      - name: Smoke test adapters
        run: npm run test:adapters:smoke

      - name: Run tests (unit + e2e)
        run: npm test
