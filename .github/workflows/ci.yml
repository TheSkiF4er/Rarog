name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Verify release metadata
        run: npm run release:verify

      - name: Build all distributables
        run: npm run build:all

      - name: Package publishable packages
        run: npm run pack:packages

      - name: Smoke test adapters
        run: npm run test:adapters:smoke

      - name: Run release regression checks
        run: node tests/rarog-build-regress.test.mjs && node tests/rarog-release-sync.test.mjs

      - name: Run tests (unit + e2e)
        run: npm test
