name: Docs

on:
  push:
    branches: [ main ]
    paths:
      - "docs/**"
      - "design/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "RELEASE.md"
      - "package.json"
      - "package-lock.json"
      - "tools/check-docs.mjs"
      - "tools/check-docs-output.mjs"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - "docs/**"
      - "design/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "RELEASE.md"
      - "package.json"
      - "package-lock.json"
      - "tools/check-docs.mjs"
      - "tools/check-docs-output.mjs"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check and build docs
        run: npm run docs:check

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: rarog-docs
          path: .gitbook/dist
