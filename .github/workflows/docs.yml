name: Docs

on:
  push:
    branches: [ main ]
    paths:
      - "docs/**"
      - "design/**"
      - "README.md"
      - "package.json"
      - "package-lock.json"
      - "tools/check-docs.mjs"
      - "tools/check-docs-output.mjs"
      - "docs/.vitepress/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - "docs/**"
      - "design/**"
      - "README.md"
      - "package.json"
      - "package-lock.json"
      - "tools/check-docs.mjs"
      - "tools/check-docs-output.mjs"
      - "docs/.vitepress/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify docs contract and build output
        run: npm run docs:check

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: rarog-docs
          path: docs/.vitepress/dist
