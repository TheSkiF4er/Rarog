name: Full CI

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "RELEASE.md"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main, master, develop]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "RELEASE.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: full-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-and-visual:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CSS, JS, and adapters
        run: npm run build:all

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Run visual regression checks
        env:
          CHROMIUM_PATH: /usr/bin/chromium
        run: npm run test:visual

      - name: Run quality gate extras
        run: npm run test:starters-install && npm run test:package-matrix && npm run test:examples-ci && npm run docs:links && npm run test:exports
