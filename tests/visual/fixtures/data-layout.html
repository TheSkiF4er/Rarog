<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rarog Visual Regression — Data & Layout</title>
  <link rel="stylesheet" href="../../../packages/core/src/rarog-core.css" />
  <link rel="stylesheet" href="../../../packages/utilities/src/rarog-utilities.css" />
  <link rel="stylesheet" href="../../../packages/components/src/rarog-components.css" />
  <link rel="stylesheet" href="../../../packages/themes/src/rarog-theme-default.css" />
  <style>
    :root { color-scheme: dark; }
    * { animation: none !important; transition: none !important; }
    body { margin: 0; background: #0b1020; color: #e5e7eb; font-family: Inter, system-ui, sans-serif; }
    .frame { max-width: 1280px; margin: 0 auto; padding: 32px; }
    .shell { display: grid; grid-template-columns: 260px minmax(0,1fr); gap: 24px; }
    .sidebar { padding: 20px; border: 1px solid rgba(148,163,184,.18); border-radius: 18px; background: rgba(15,23,42,.65); }
    .content { display: flex; flex-direction: column; gap: 24px; }
    .stats { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 14px; border-bottom: 1px solid rgba(148,163,184,.18); text-align: left; }
  </style>
</head>
<body>
  <main class="frame">
    <div class="shell">
      <aside class="sidebar">
        <div class="text-primary mb-3" style="font-weight:700;">Rarog Admin</div>
        <nav class="navbar-nav d-flex flex-column gap-2">
          <a class="navbar-link navbar-link-active" href="#">Overview</a>
          <a class="navbar-link" href="#">Users</a>
          <a class="navbar-link" href="#">Billing</a>
          <a class="navbar-link" href="#">Logs</a>
        </nav>
      </aside>
      <section class="content">
        <div class="stats">
          <div class="card"><div class="card-header">MRR</div><div class="card-body"><div style="font-size:1.6rem;font-weight:700;">€48,320</div><div class="text-muted">+8.4% vs last month</div></div></div>
          <div class="card"><div class="card-header">Active teams</div><div class="card-body"><div style="font-size:1.6rem;font-weight:700;">214</div><div class="text-muted">12 enterprise upgrades</div></div></div>
          <div class="card"><div class="card-header">NPS</div><div class="card-body"><div style="font-size:1.6rem;font-weight:700;">61</div><div class="text-muted">Measured weekly</div></div></div>
        </div>
        <div class="card">
          <div class="card-header d-flex justify-between items-center"><span>DataTable</span><span class="badge badge-outline">3 rows</span></div>
          <div class="card-body">
            <table>
              <thead>
                <tr><th>Company</th><th>Status</th><th>Plan</th><th>MRR</th></tr>
              </thead>
              <tbody>
                <tr><td>Northwind Labs</td><td><span class="badge badge-success">Healthy</span></td><td>Enterprise</td><td>€6,800</td></tr>
                <tr><td>Polar Stack</td><td><span class="badge badge-warning">Attention</span></td><td>Growth</td><td>€2,140</td></tr>
                <tr><td>Crane Systems</td><td><span class="badge badge-primary">New</span></td><td>Starter</td><td>€540</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
